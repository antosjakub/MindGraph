<body>

        <circle cx="14" cy="21" r="3" stroke="currentColor" stroke-width="1.5"/>
        <line x1="9.5" y1="8.5" x2="12" y2="19" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
        <line x1="18.5" y1="8.5" x2="16" y2="19" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
        <line x1="10" y1="7" x2="18" y2="7" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
      </svg>
      <span class="app-name">MindGraph</span>
      <span class="board-name" id="boardName" title="Click to rename"></span>
    </div>
    <div class="topbar-center">
      <button id="btnBoards" title="Boards (B)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>
        Boards
      </button>
      <div class="sep"></div>
      <button id="btnAddNode" title="Add node (N)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
        Node
      </button>
      <button id="btnConnect" title="Connect mode (C)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="4" cy="4" r="2.5"/><circle cx="12" cy="12" r="2.5"/><line x1="6" y1="6" x2="10" y2="10"/></svg>
        Connect
      </button>
      <button id="btnGroup" title="Group selected (G)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="14" height="14" rx="3" stroke-dasharray="3 2"/></svg>
        Group
      </button>
      <div class="sep"></div>
      <button id="btnDelete" title="Delete selected (Del)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="2" y1="2" x2="14" y2="14"/><line x1="14" y1="2" x2="2" y2="14"/></svg>
        Delete
      </button>
    </div>
    <div class="topbar-right">
      <span id="zoomLevel" class="zoom-display">100%</span>
      <button id="btnZoomIn" title="Zoom in (+)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="4" x2="8" y2="12"/><line x1="4" y1="8" x2="12" y2="8"/></svg>
      </button>
      <button id="btnZoomOut" title="Zoom out (-)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="8" x2="12" y2="8"/></svg>
      </button>
      <button id="btnFitView" title="Fit view (F)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="1,5 1,1 5,1"/><polyline points="11,1 15,1 15,5"/><polyline points="15,11 15,15 11,15"/><polyline points="5,15 1,15 1,11"/></svg>
      </button>
    </div>
  </header>

  <!-- Canvas area -->
  <div id="canvasArea">
    <svg id="connectionsSvg">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4f98a3"/>
        </marker>
      </defs>
    </svg>
    <div id="nodesContainer"></div>
    <!-- Selection rectangle -->
    <div id="selectionRect" class="selection-rect hidden"></div>
  </div>

  <!-- Board panel -->
  <div id="boardPanel" class="panel hidden">
    <div class="panel-header">
      <h3>Boards</h3>
      <button id="closeBoardPanel" class="panel-close">&times;</button>
    </div>
    <div class="panel-body">
      <button id="btnNewBoard" class="panel-btn">+ New Board</button>
      <div id="boardList"></div>
    </div>
  </div>

  <!-- Popup modal for expanded editing -->
  <div id="editorModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Edit Note</h3>
        <button id="closeModal" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="editor-panes">
          <textarea id="modalEditor" spellcheck="false" placeholder="Write markdown here... Use $...$ for inline LaTeX, $$...$$ for display math, and ```code``` for code blocks."></textarea>
          <div id="modalPreview" class="md-preview"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Context menu -->
  <div id="contextMenu" class="context-menu hidden">
    <button data-action="edit">Edit in popup</button>
    <button data-action="connect">Connect to...</button>
    <button data-action="disconnect">Remove connections</button>
    <button data-action="group">Group selected</button>
    <button data-action="ungroup">Ungroup</button>
    <button data-action="color">Change color</button>
    <button data-action="delete">Delete</button>
  </div>

  <!-- Color picker -->
  <div id="colorPicker" class="color-picker hidden">
    <button data-color="#4f98a3" style="background:#4f98a3" title="Teal"></button>
    <button data-color="#a86fdf" style="background:#a86fdf" title="Purple"></button>

    <button data-color="#fdab43" style="background:#fdab43" title="Orange"></button>
    <button data-color="#5591c7" style="background:#5591c7" title="Blue"></button>
    <button data-color="#cdccca" style="background:#cdccca" title="Default"></button>

<script data-pplx-inline-edit>
(function(){
  if(window===window.top)return;
  function inlineAll(orig,clone){
    if(orig.nodeType!==1)return;
    try{
      var cs=getComputedStyle(orig);
      var t='';
      for(var i=0;i<cs.length;i++){t+=cs[i]+':'+cs.getPropertyValue(cs[i])+';';}
      clone.style.cssText=t;
    }catch(e){}
    var oc=orig.children,cc=clone.children;
    for(var j=0;j<oc.length&&j<cc.length;j++){inlineAll(oc[j],cc[j]);}
  }
  function stripExternal(clone){
    var imgs=clone.querySelectorAll('img');
    for(var i=0;i<imgs.length;i++){
      var s=imgs[i].getAttribute('src');
      if(s&&!s.startsWith('data:'))imgs[i].removeAttribute('src');
    }
    var all=clone.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var st=all[i].style.cssText;
      if(st&&st.indexOf('url(')>=0){
        all[i].style.cssText=st.replace(/url\(["']?(?!data:)[^)"']*["']?\)/gi,'none');
      }
    }
  }
  window.addEventListener('message',function(e){
    if(!e.data||e.data.type!=='INLINE_EDIT_CAPTURE_REQUEST')return;
    var scrollX=window.scrollX||window.pageXOffset||0;
    var scrollY=window.scrollY||window.pageYOffset||0;
    var w=window.innerWidth,h=window.innerHeight;
    try{
      var clone=document.documentElement.cloneNode(true);
      var rm=clone.querySelectorAll('script,link[rel="stylesheet"],style');
      for(var i=0;i<rm.length;i++){rm[i].remove();}
      inlineAll(document.documentElement,clone);
      stripExternal(clone);
      var html=new XMLSerializer().serializeToString(clone);
      var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'
        +'<foreignObject width="100%" height="100%">'
        +'<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;height:'+h+'px;overflow:hidden">'
        +'<div style="transform:translate(-'+scrollX+'px,-'+scrollY+'px);transform-origin:top left">'
        +html+'</div></div></foreignObject></svg>';
      var svgUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      var img=new Image();
      img.onload=function(){
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0);
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:c.toDataURL('image/png'),scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.onerror=function(){
        window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
      };
      img.src=svgUrl;
    }catch(err){
      window.parent.postMessage({type:'INLINE_EDIT_SCREENSHOT_RESULT',dataUrl:null,scrollX:scrollX,scrollY:scrollY},'*');
    }
  });
})();
</script></body>
